  # ═══════════════════════════════════════════════════════════════════════════════════════
  #                              QUICK REFERENCE
  # ═══════════════════════════════════════════════════════════════════════════════════════

  quick_reference:
    fase_1:
      name: "Coleta: Sistema"
      agent: "@architect"
      command: "*document-project"
      output: "docs/architecture/system-architecture.md"
      duration: "30-60 min"
    fase_2:
      name: "Coleta: Database"
      agent: "@data-engineer"
      command: "*db-schema-audit + *security-audit"
      output: "supabase/docs/SCHEMA.md, DB-AUDIT.md"
      duration: "20-40 min"
    fase_3:
      name: "Coleta: Frontend"
      agent: "@ux-design-expert"
      command: "*create-front-end-spec"
      output: "docs/frontend/frontend-spec.md"
      duration: "30-45 min"
    fase_4:
      name: "Consolidação Inicial"
      agent: "@architect"
      command: "(manual prompt)"
      output: "docs/prd/technical-debt-DRAFT.md"
      duration: "30-45 min"
    fase_5:
      name: "Validação DB"
      agent: "@data-engineer"
      command: "(manual review)"
      output: "docs/reviews/db-specialist-review.md"
      duration: "20-30 min"
    fase_6:
      name: "Validação UX"
      agent: "@ux-design-expert"
      command: "(manual review)"
      output: "docs/reviews/ux-specialist-review.md"
      duration: "20-30 min"
    fase_7:
      name: "QA Review"
      agent: "@qa"
      command: "(manual review)"
      output: "docs/reviews/qa-review.md"
      duration: "30-45 min"
    fase_8:
      name: "Assessment Final"
      agent: "@architect"
      command: "(manual consolidation)"
      output: "docs/prd/technical-debt-assessment.md"
      duration: "30-45 min"
    fase_9:
      name: "Relatório Executivo"
      agent: "@analyst"
      command: "(manual report)"
      output: "docs/reports/TECHNICAL-DEBT-REPORT.md"
      duration: "30-45 min"
    fase_10:
      name: "Planning"
      agent: "@pm"
      command: "*brownfield-create-epic + *brownfield-create-story"
      output: "docs/stories/epic-*.md, story-*.md"
      duration: "30-60 min"

  time_estimate:
    minimum: "4 horas"
    typical: "5-6 horas"
    complex_project: "8 horas"

  decision_guidance:
    when_to_use:
      - Migrando projeto de Lovable/v0.dev
      - Auditoria completa de codebase
      - Planejamento de modernização
      - Assessment antes de investimento
      - Onboarding em projeto legado
      - Due diligence técnica
    when_not_to_use:
      - New project development from scratch (use greenfield-* workflows)
      - Small enhancement to existing project (use brownfield-service, brownfield-ui, or brownfield-fullstack)
      - Single story fix or bug (use brownfield-create-story task directly)
      - Project already has comprehensive documentation (skip to brownfield-* workflow)

  handoff_prompts:
    coleta_complete: |
      Fases 1-3 completas. Documentação coletada:
      - Sistema: docs/architecture/system-architecture.md
      - Database: supabase/docs/SCHEMA.md
      - Frontend: docs/frontend/frontend-spec.md

      Próximo: @architect para consolidação inicial (FASE 4)

    draft_complete: |
      DRAFT criado: docs/prd/technical-debt-DRAFT.md

      Próximo: Validação dos especialistas (FASES 5-7)
      - @data-engineer: revisar seção de Database
      - @ux-design-expert: revisar seção de Frontend
      - @qa: review geral

    validation_complete: |
      Validações completas:
      - docs/reviews/db-specialist-review.md ✅
      - docs/reviews/ux-specialist-review.md ✅
      - docs/reviews/qa-review.md ✅

      Próximo: @architect para assessment final (FASE 8)

    assessment_complete: |
      Assessment final: docs/prd/technical-debt-assessment.md

      Próximo: @analyst para relatório executivo (FASE 9)

    report_complete: |
      Relatório executivo: docs/reports/TECHNICAL-DEBT-REPORT.md

      Próximo: @pm para criar epic e stories (FASE 10)

    workflow_complete: |
      ✅ DISCOVERY COMPLETO!

      Documentos para stakeholders:
      - docs/reports/TECHNICAL-DEBT-REPORT.md (executivo)

      Documentos para desenvolvimento:
      - docs/stories/epic-technical-debt.md
      - docs/stories/story-*.md

      Pronto para: @dev implementar stories
